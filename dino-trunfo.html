<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Trunfo Dino — Painel de Controle</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --c0: #0d1b2a;
      --c1: #1b263b;
      --c2: #415a77;
      --c3: #778da9;
      --c4: #e0e1dd;
      --accent: #a8c5da;
      --danger: #c94040;
      --success: #4caf7d;
      --radius: 12px;
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--c0);
      color: var(--c4);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Background texture ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(65,90,119,.35) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 80%, rgba(27,38,59,.6) 0%, transparent 55%);
      pointer-events: none;
    }

    /* ── Layout ── */
    .wrapper { position: relative; z-index: 1; max-width: 1300px; margin: 0 auto; padding: 0 24px 80px; }

    /* ── Header ── */
    header {
      display: flex; align-items: flex-end; justify-content: space-between;
      padding: 48px 0 36px;
      border-bottom: 1px solid rgba(119,141,169,.3);
      gap: 16px; flex-wrap: wrap;
    }
    .logo-block { display: flex; flex-direction: column; gap: 4px; }
    .logo-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 8vw, 5.5rem);
      letter-spacing: 0.04em;
      line-height: 1;
      background: linear-gradient(135deg, var(--c4) 30%, var(--c3) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      animation: fadeSlideDown .7s ease both;
    }
    .logo-sub {
      font-family: 'DM Mono', monospace;
      font-size: .75rem; letter-spacing: .2em;
      color: var(--c3); text-transform: uppercase;
      animation: fadeSlideDown .7s .1s ease both;
    }
    .header-status {
      display: flex; align-items: center; gap: 8px;
      font-family: 'DM Mono', monospace; font-size: .75rem;
      color: var(--c3); animation: fadeIn .8s .3s ease both;
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 8px var(--success);
      animation: pulse 2s infinite;
    }
    .status-dot.offline { background: var(--danger); box-shadow: 0 0 8px var(--danger); animation: none; }

    /* ── Toolbar ── */
    .toolbar {
      display: flex; align-items: center; gap: 12px;
      padding: 28px 0 20px; flex-wrap: wrap;
      animation: fadeIn .6s .25s ease both;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 20px; border-radius: var(--radius);
      font-family: 'DM Mono', monospace; font-size: .8rem; letter-spacing: .05em;
      border: 1px solid transparent; cursor: pointer;
      transition: transform var(--transition), box-shadow var(--transition), background var(--transition), border-color var(--transition);
      position: relative; overflow: hidden;
    }
    .btn::after {
      content: ''; position: absolute; inset: 0;
      background: white; opacity: 0;
      transition: opacity .2s;
    }
    .btn:hover::after { opacity: .06; }
    .btn:active { transform: scale(.96); }

    .btn-primary {
      background: var(--c2); color: var(--c4);
      border-color: var(--c3);
    }
    .btn-primary:hover { box-shadow: 0 0 20px rgba(65,90,119,.7); transform: translateY(-1px); }

    .btn-success {
      background: rgba(76,175,125,.15); color: var(--success);
      border-color: rgba(76,175,125,.4);
    }
    .btn-success:hover { background: rgba(76,175,125,.25); box-shadow: 0 0 18px rgba(76,175,125,.3); transform: translateY(-1px); }

    .btn-danger {
      background: rgba(201,64,64,.12); color: #e07070;
      border-color: rgba(201,64,64,.35);
    }
    .btn-danger:hover { background: rgba(201,64,64,.22); box-shadow: 0 0 18px rgba(201,64,64,.3); transform: translateY(-1px); }

    .btn-ghost {
      background: transparent; color: var(--c3);
      border-color: rgba(119,141,169,.3);
    }
    .btn-ghost:hover { border-color: var(--c3); color: var(--c4); transform: translateY(-1px); }

    .btn-icon { font-size: 1rem; line-height: 1; }
    .sep { flex: 1; }

    /* ── Search ── */
    .search-wrap {
      position: relative; display: flex; align-items: center;
    }
    .search-wrap .search-icon {
      position: absolute; left: 12px; color: var(--c3); pointer-events: none;
      font-size: .9rem;
    }
    .search-input {
      background: var(--c1); border: 1px solid rgba(119,141,169,.3);
      border-radius: var(--radius); color: var(--c4);
      font-family: 'DM Mono', monospace; font-size: .8rem;
      padding: 10px 16px 10px 36px;
      transition: border-color var(--transition), box-shadow var(--transition);
      width: 200px;
    }
    .search-input:focus { outline: none; border-color: var(--c3); box-shadow: 0 0 12px rgba(119,141,169,.25); }
    .search-input::placeholder { color: rgba(119,141,169,.5); }

    /* ── Stats bar ── */
    .stats-bar {
      display: flex; gap: 20px; margin-bottom: 32px;
      flex-wrap: wrap; animation: fadeIn .6s .35s ease both;
    }
    .stat-chip {
      background: var(--c1); border: 1px solid rgba(119,141,169,.2);
      border-radius: 8px; padding: 8px 16px;
      font-family: 'DM Mono', monospace; font-size: .72rem;
      color: var(--c3); display: flex; align-items: center; gap: 8px;
    }
    .stat-chip strong { color: var(--c4); font-weight: 500; }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 20px;
    }

    /* ── Card ── */
    .card {
      background: var(--c1);
      border: 1px solid rgba(119,141,169,.18);
      border-radius: 16px;
      overflow: hidden;
      display: flex; flex-direction: column;
      transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
      animation: cardIn .5s ease both;
      position: relative;
    }
    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 50px rgba(0,0,0,.5), 0 0 0 1px rgba(119,141,169,.3);
      border-color: rgba(119,141,169,.4);
    }
    .card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--c2), var(--c3), var(--accent));
      opacity: 0;
      transition: opacity var(--transition);
    }
    .card:hover::before { opacity: 1; }

    .card-img-wrap {
      position: relative; overflow: hidden;
      background: linear-gradient(135deg, var(--c0), var(--c1));
      height: 180px;
    }
    .card-img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform .5s cubic-bezier(0.4,0,0.2,1);
    }
    .card:hover .card-img { transform: scale(1.06); }
    .card-img-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 4rem; opacity: .35;
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: .1em; color: var(--c3);
    }
    .card-id-badge {
      position: absolute; top: 10px; right: 10px;
      background: rgba(13,27,42,.8); backdrop-filter: blur(8px);
      border: 1px solid rgba(119,141,169,.3);
      border-radius: 6px; padding: 3px 8px;
      font-family: 'DM Mono', monospace; font-size: .68rem;
      color: var(--c3);
    }

    .card-body { padding: 18px; flex: 1; display: flex; flex-direction: column; gap: 14px; }
    .card-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.55rem; letter-spacing: .05em;
      color: var(--c4); line-height: 1;
    }

    /* ── Stats grid ── */
    .card-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .stat {
      background: rgba(13,27,42,.6);
      border: 1px solid rgba(119,141,169,.12);
      border-radius: 8px; padding: 8px 10px;
    }
    .stat-label {
      font-family: 'DM Mono', monospace; font-size: .6rem;
      letter-spacing: .12em; color: var(--c3); text-transform: uppercase;
      margin-bottom: 3px;
    }
    .stat-value { font-size: .95rem; font-weight: 600; color: var(--c4); }

    /* ── Magic number ── */
    .magic-banner {
      background: linear-gradient(90deg, rgba(65,90,119,.3), rgba(119,141,169,.15));
      border: 1px solid rgba(119,141,169,.25);
      border-radius: 8px; padding: 10px 14px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .magic-label {
      font-family: 'DM Mono', monospace; font-size: .65rem;
      letter-spacing: .12em; color: var(--c3); text-transform: uppercase;
    }
    .magic-value {
      font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem;
      color: var(--accent); letter-spacing: .05em;
    }

    /* ── Card actions ── */
    .card-actions {
      display: flex; gap: 8px;
      padding: 0 18px 18px;
    }
    .card-actions .btn { flex: 1; justify-content: center; padding: 8px 12px; font-size: .72rem; }

    /* ── Modal ── */
    .overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(13,27,42,.85); backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      opacity: 0; pointer-events: none;
      transition: opacity .3s ease;
    }
    .overlay.active { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--c1);
      border: 1px solid rgba(119,141,169,.25);
      border-radius: 20px; padding: 36px;
      width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto;
      transform: translateY(20px) scale(.97);
      transition: transform .35s cubic-bezier(.4,0,.2,1);
      box-shadow: 0 40px 80px rgba(0,0,0,.6);
    }
    .overlay.active .modal { transform: translateY(0) scale(1); }

    .modal-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem; letter-spacing: .05em;
      color: var(--c4); margin-bottom: 24px;
    }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    .form-label {
      font-family: 'DM Mono', monospace; font-size: .68rem;
      letter-spacing: .1em; color: var(--c3); text-transform: uppercase;
    }
    .form-input {
      background: var(--c0); border: 1px solid rgba(119,141,169,.25);
      border-radius: 8px; color: var(--c4);
      font-family: 'DM Mono', monospace; font-size: .85rem;
      padding: 10px 14px;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .form-input:focus {
      outline: none; border-color: var(--c3);
      box-shadow: 0 0 12px rgba(119,141,169,.2);
    }

    .form-actions { display: flex; gap: 10px; margin-top: 24px; justify-content: flex-end; }

    /* ── Toast ── */
    .toast-zone {
      position: fixed; bottom: 28px; right: 28px; z-index: 200;
      display: flex; flex-direction: column; gap: 10px; align-items: flex-end;
    }
    .toast {
      background: var(--c1);
      border: 1px solid rgba(119,141,169,.3);
      border-radius: 10px; padding: 12px 20px;
      font-family: 'DM Mono', monospace; font-size: .78rem;
      color: var(--c4); box-shadow: 0 12px 30px rgba(0,0,0,.4);
      display: flex; align-items: center; gap: 10px;
      animation: toastIn .35s ease both;
      max-width: 320px;
    }
    .toast.success { border-color: rgba(76,175,125,.4); }
    .toast.error   { border-color: rgba(201,64,64,.4); }
    .toast-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .toast.success .toast-dot { background: var(--success); }
    .toast.error   .toast-dot { background: var(--danger); }
    .toast.info    .toast-dot { background: var(--accent); }

    /* ── Loading / Empty ── */
    .loader-wrap {
      grid-column: 1 / -1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 80px 0; gap: 16px; color: var(--c3);
      font-family: 'DM Mono', monospace; font-size: .8rem; letter-spacing: .1em;
    }
    .spinner {
      width: 36px; height: 36px; border-radius: 50%;
      border: 2px solid rgba(119,141,169,.2);
      border-top-color: var(--c3);
      animation: spin .8s linear infinite;
    }
    .empty-state {
      grid-column: 1 / -1; text-align: center;
      padding: 80px 0; color: var(--c3);
      font-family: 'DM Mono', monospace; font-size: .85rem;
    }
    .empty-dino { font-size: 4rem; margin-bottom: 16px; opacity: .4; }

    /* ── Confirm dialog ── */
    .confirm-msg {
      font-size: .9rem; line-height: 1.6; color: var(--c3);
      margin-bottom: 20px;
    }
    .confirm-name { color: var(--c4); font-weight: 600; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--c0); }
    ::-webkit-scrollbar-thumb { background: var(--c2); border-radius: 3px; }

    /* ── Keyframes ── */
    @keyframes fadeSlideDown {
      from { opacity: 0; transform: translateY(-14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; } to { opacity: 1; }
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px) scale(.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(30px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 6px var(--success); }
      50%      { box-shadow: 0 0 14px var(--success); }
    }
  </style>
</head>
<body>

<div class="wrapper">

  <!-- Header -->
  <header>
    <div class="logo-block">
      <div class="logo-title">🦕 TRUNFO DINO</div>
      <div class="logo-sub">Painel de Administração · API REST</div>
    </div>
    <div class="header-status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">conectando...</span>
    </div>
  </header>

  <!-- Toolbar -->
  <div class="toolbar">
    <button class="btn btn-success" onclick="openCreate()">
      <span class="btn-icon">＋</span> Novo Dino
    </button>
    <button class="btn btn-primary" onclick="loadDinos()">
      <span class="btn-icon">↻</span> Atualizar
    </button>
    <div class="sep"></div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" type="text" id="searchInput" placeholder="Buscar dino..." oninput="filterCards()"/>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-bar" id="statsBar" style="opacity:0"></div>

  <!-- Grid -->
  <div class="grid" id="grid">
    <div class="loader-wrap">
      <div class="spinner"></div>
      <span>carregando dinossauros...</span>
    </div>
  </div>

</div>

<!-- Overlay / Modal -->
<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <!-- filled dynamically -->
  </div>
</div>

<!-- Toasts -->
<div class="toast-zone" id="toastZone"></div>

<script>
  const API = 'http://localhost:3000';
  let allDinos = [];

  /* ── API helpers ── */
  async function apiFetch(path, opts = {}) {
    const res = await fetch(API + path, {
      headers: { 'Content-Type': 'application/json' },
      ...opts
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || `HTTP ${res.status}`);
    }
    return res.json();
  }

  /* ── Status ping ── */
  async function pingServer() {
    const dot  = document.getElementById('statusDot');
    const text = document.getElementById('statusText');
    try {
      await fetch(API + '/dinos', { method: 'HEAD' }).catch(() => fetch(API + '/dinos'));
      dot.classList.remove('offline');
      text.textContent = 'servidor online · porta 3000';
    } catch {
      dot.classList.add('offline');
      text.textContent = 'servidor offline';
    }
  }

  /* ── Load & render ── */
  async function loadDinos() {
    const grid = document.getElementById('grid');
    grid.innerHTML = `<div class="loader-wrap"><div class="spinner"></div><span>carregando...</span></div>`;
    try {
      allDinos = await apiFetch('/dinos');
      renderGrid(allDinos);
      renderStats(allDinos);
      pingServer();
    } catch (e) {
      grid.innerHTML = `<div class="empty-state"><div class="empty-dino">🦴</div><p>Não foi possível conectar à API.<br>Certifique-se de que o servidor está rodando em <code>localhost:3000</code></p></div>`;
      toast('Erro ao carregar: ' + e.message, 'error');
      document.getElementById('statusDot').classList.add('offline');
      document.getElementById('statusText').textContent = 'servidor offline';
    }
  }

  function renderStats(dinos) {
    const bar = document.getElementById('statsBar');
    if (!dinos.length) { bar.style.opacity = '0'; return; }
    const fastest = dinos.reduce((a,b) => +b.velocidade > +a.velocidade ? b : a);
    const heaviest = dinos.reduce((a,b) => +b.peso > +a.peso ? b : a);
    bar.innerHTML = `
      <div class="stat-chip">Total <strong>${dinos.length}</strong></div>
      <div class="stat-chip">Mais veloz <strong>${fastest.nome}</strong> · ${fastest.velocidade} km/h</div>
      <div class="stat-chip">Mais pesado <strong>${heaviest.nome}</strong> · ${heaviest.peso} kg</div>
    `;
    bar.style.opacity = '1';
  }

  function renderGrid(dinos) {
    const grid = document.getElementById('grid');
    if (!dinos.length) {
      grid.innerHTML = `<div class="empty-state"><div class="empty-dino">🦕</div><p>Nenhum dinossauro encontrado.</p></div>`;
      return;
    }
    grid.innerHTML = dinos.map((d, i) => cardHTML(d, i)).join('');
  }

  function cardHTML(d, i) {
    const delay = Math.min(i * 0.06, 0.5);
    const imgBlock = d.imagem
      ? `<img class="card-img" src="${escHtml(d.imagem)}" alt="${escHtml(d.nome)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      : '';
    return `
    <div class="card" style="animation-delay:${delay}s">
      <div class="card-img-wrap">
        ${imgBlock}
        <div class="card-img-placeholder" style="${d.imagem ? 'display:none' : ''}">DINO</div>
        <div class="card-id-badge">#${d.id_dino}</div>
      </div>
      <div class="card-body">
        <div class="card-name">${escHtml(d.nome)}</div>
        <div class="card-stats">
          <div class="stat"><div class="stat-label">Altura</div><div class="stat-value">${d.altura} m</div></div>
          <div class="stat"><div class="stat-label">Comprimento</div><div class="stat-value">${d.comprimento} m</div></div>
          <div class="stat"><div class="stat-label">Peso</div><div class="stat-value">${d.peso} kg</div></div>
          <div class="stat"><div class="stat-label">Velocidade</div><div class="stat-value">${d.velocidade} km/h</div></div>
          <div class="stat"><div class="stat-label">Agilidade</div><div class="stat-value">${d.agilidade}</div></div>
          <div class="stat"><div class="stat-label">Longevidade</div><div class="stat-value">${d.longevidade} anos</div></div>
        </div>
        <div class="magic-banner">
          <div>
            <div class="magic-label">✦ Número Mágico</div>
          </div>
          <div class="magic-value">${d.numero_magico}</div>
        </div>
      </div>
      <div class="card-actions">
        <button class="btn btn-ghost" onclick="openEdit(${d.id_dino})">✎ Editar</button>
        <button class="btn btn-danger" onclick="confirmDelete(${d.id_dino}, '${escHtml(d.nome)}')">✕ Deletar</button>
      </div>
    </div>`;
  }

  /* ── Filter ── */
  function filterCards() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const filtered = allDinos.filter(d => d.nome.toLowerCase().includes(q));
    renderGrid(filtered);
  }

  /* ── Modal helpers ── */
  function openOverlay(html) {
    document.getElementById('modal').innerHTML = html;
    document.getElementById('overlay').classList.add('active');
  }
  function closeOverlay() {
    document.getElementById('overlay').classList.remove('active');
  }
  function handleOverlayClick(e) {
    if (e.target === document.getElementById('overlay')) closeOverlay();
  }

  /* ── Field definitions ── */
  const fields = [
    { key: 'nome',          label: 'Nome',          type: 'text',   full: true },
    { key: 'altura',        label: 'Altura (m)',     type: 'number' },
    { key: 'comprimento',   label: 'Comprimento (m)',type: 'number' },
    { key: 'peso',          label: 'Peso (kg)',      type: 'number' },
    { key: 'velocidade',    label: 'Velocidade',     type: 'number' },
    { key: 'agilidade',     label: 'Agilidade',      type: 'number' },
    { key: 'longevidade',   label: 'Longevidade',    type: 'number' },
    { key: 'numero_magico', label: 'Número Mágico',  type: 'number' },
    { key: 'imagem',        label: 'URL da Imagem',  type: 'text',   full: true },
  ];

  function formFields(data = {}) {
    return fields.map(f => `
      <div class="form-group${f.full ? ' full' : ''}">
        <label class="form-label">${f.label}</label>
        <input class="form-input" type="${f.type}" name="${f.key}" value="${escHtml(String(data[f.key] ?? ''))}" step="any" placeholder="${f.label}"/>
      </div>`).join('');
  }

  function collectForm() {
    const inputs = document.querySelectorAll('#modal .form-input');
    const data = {};
    inputs.forEach(i => { data[i.name] = i.value; });
    return data;
  }

  /* ── Create ── */
  function openCreate() {
    openOverlay(`
      <div class="modal-title">🦕 Novo Dinossauro</div>
      <div class="form-grid">${formFields()}</div>
      <div class="form-actions">
        <button class="btn btn-ghost" onclick="closeOverlay()">Cancelar</button>
        <button class="btn btn-success" onclick="submitCreate()">✓ Criar</button>
      </div>`);
  }

  async function submitCreate() {
    const data = collectForm();
    try {
      await apiFetch('/dinos', { method: 'POST', body: JSON.stringify(data) });
      closeOverlay();
      toast(`${data.nome} criado com sucesso!`, 'success');
      await loadDinos();
    } catch (e) { toast('Erro: ' + e.message, 'error'); }
  }

  /* ── Edit ── */
  async function openEdit(id) {
    try {
      const dino = await apiFetch(`/dinos/${id}`);
      openOverlay(`
        <div class="modal-title">✎ Editar — ${escHtml(dino.nome)}</div>
        <div class="form-grid">${formFields(dino)}</div>
        <div class="form-actions">
          <button class="btn btn-ghost" onclick="closeOverlay()">Cancelar</button>
          <button class="btn btn-primary" onclick="submitEdit(${id})">↑ Salvar</button>
        </div>`);
    } catch (e) { toast('Erro ao buscar dino: ' + e.message, 'error'); }
  }

  async function submitEdit(id) {
    const data = collectForm();
    try {
      await apiFetch(`/dinos/${id}`, { method: 'PUT', body: JSON.stringify(data) });
      closeOverlay();
      toast(`${data.nome} atualizado!`, 'success');
      await loadDinos();
    } catch (e) { toast('Erro: ' + e.message, 'error'); }
  }

  /* ── Delete ── */
  function confirmDelete(id, nome) {
    openOverlay(`
      <div class="modal-title">Confirmar exclusão</div>
      <p class="confirm-msg">Tem certeza que deseja deletar <span class="confirm-name">${escHtml(nome)}</span>? Esta ação não pode ser desfeita.</p>
      <div class="form-actions">
        <button class="btn btn-ghost" onclick="closeOverlay()">Cancelar</button>
        <button class="btn btn-danger" onclick="submitDelete(${id})">✕ Deletar</button>
      </div>`);
  }

  async function submitDelete(id) {
    try {
      await apiFetch(`/dinos/${id}`, { method: 'DELETE' });
      closeOverlay();
      toast('Dinossauro deletado.', 'info');
      await loadDinos();
    } catch (e) { toast('Erro: ' + e.message, 'error'); }
  }

  /* ── Toast ── */
  function toast(msg, type = 'info') {
    const zone = document.getElementById('toastZone');
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.innerHTML = `<div class="toast-dot"></div><span>${msg}</span>`;
    zone.appendChild(el);
    setTimeout(() => {
      el.style.animation = 'none';
      el.style.opacity = '0';
      el.style.transition = 'opacity .3s';
      setTimeout(() => el.remove(), 300);
    }, 3200);
  }

  /* ── Util ── */
  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── Init ── */
  loadDinos();
</script>
</body>
</html>
